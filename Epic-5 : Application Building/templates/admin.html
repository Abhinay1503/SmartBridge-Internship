{% extends 'base.html' %}

{% block title %}Administrative Access Portal{% endblock %}

{% block content %}
<div class="row justify-content-center my-5">
    <div class="col-md-6 col-lg-5">
        <div class="glass-card">
            <div class="text-center mb-4">
                <i class="fas fa-user-shield fa-4x text-primary mb-3"></i>
                <h4 class="fw-bold m-0">Administrator Login</h4>
                <p class="text-secondary small">Unlock system modification and record deletion privileges</p>
            </div>
            
            <form method="POST" action="{{ url_for('admin') }}">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 border-color"><i class="fas fa-user text-secondary"></i></span>
                        <input type="text" class="form-control border-start-0" id="username" name="username" placeholder="e.g. admin" required>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 border-color"><i class="fas fa-lock text-secondary"></i></span>
                        <input type="password" class="form-control border-start-0" id="password" name="password" placeholder="••••••••" required>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-gradient-blue w-100 py-3 fw-bold"><i class="fas fa-key me-2"></i> Authenticate Credentials</button>
            </form>
            
            <div class="mt-4 pt-3 border-top border-color text-center">
                <small class="text-secondary">Default credentials: <b>admin / admin123</b></small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
